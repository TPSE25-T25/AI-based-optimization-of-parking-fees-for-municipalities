server {
    listen 80;
    server_name localhost;

    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend service
    location /load_city {
        proxy_pass http://backend:6173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /optimize {
        proxy_pass http://backend:6173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Stream the request body directly to the backend — avoids buffering
        # large city payloads to a temp file before forwarding.
        proxy_request_buffering off;

        # Give the backend plenty of time to finish the optimization.
        # This could be exploited but for the prototype is fine.
        proxy_connect_timeout  60s;
        proxy_send_timeout     604800s;
        proxy_read_timeout     604800s;
    }

    location /results {
        proxy_pass http://backend:6173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /reverse-geocode {
        proxy_pass http://backend:6173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /select_best_solution_by_weight {
        proxy_pass http://backend:6173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /optimization-settings {
        proxy_pass http://backend:6173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://backend:6173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve React app — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
